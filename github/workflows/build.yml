name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository code
    - name: Checkout Code
      uses: actions/checkout@v4
    
    # 2. Set up the Java Development Kit
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # Automatically caches Gradle dependencies to speed up future builds

    # 3. Setup Gradle (Optional but recommended for precise versioning)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.1

    # 4. Ensure the wrapper has execution permissions
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    # 5. Build the debug APK using the wrapper
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 6. Upload the generated APK as a build artifact
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

